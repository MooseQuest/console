name: docker

# Build a multi-arch (amd64 + arm64) image and push it to GHCR and — when the
# Docker Hub secrets are configured — Docker Hub. Triggers on version tags and
# on manual dispatch (so a published release can be (re)built on demand).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the image (e.g. 0.5.0); defaults to the latest git tag"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need tags for `git describe`

      - name: Resolve version and target registries
        id: cfg
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            V="${INPUT_VERSION#v}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"
          fi
          [ -n "$V" ] || { echo "could not determine version"; exit 1; }
          MINOR="$(echo "$V" | cut -d. -f1-2)"
          {
            echo "version=$V"
            echo "minor=$MINOR"
            echo "images<<EOF"
            echo "ghcr.io/moosequest/console"
            if [ -n "$DOCKERHUB_TOKEN" ]; then echo "docker.io/moosequest/console"; fi
            echo "EOF"
            echo "dockerhub=$([ -n "$DOCKERHUB_TOKEN" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.cfg.outputs.dockerhub == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.cfg.outputs.images }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.cfg.outputs.version }}
            type=raw,value=${{ steps.cfg.outputs.minor }}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Console
            org.opencontainers.image.description=Feature flags + status monitoring in one static Go binary
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.cfg.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
