# .vault.toml — vault-kit manifest for console
#
# NON-SECRET: this file contains only project identifiers and key NAMES.
# NEVER put secret values, client secrets, or passwords in this file.
# Commit this file to version control.
#
# Onboarded to the real taxonomy project moosequest-core on 2026-07-13.

vault_url   = "https://vault.raxx.app"
env         = "prod"
secret_path = "/console"

[project]
id   = "40b10e5b-413d-449a-a546-5a46a34997c0"
name = "moosequest-core"
slug = "console"

# Key NAMES this repo needs from the vault (values live in vault, never here).
# rvault resolves them at runtime — they never touch disk.
# Add a name here only after its value exists at env=prod path=/console in vault,
# then run `rvault check`.
keys = [
  "DOCKERHUB_TOKEN",
  "DOCKERHUB_USERNAME",
]
